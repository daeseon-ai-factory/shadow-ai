spring:
  application:
    name: tubeshadow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Drain in-flight HTTP requests and let the @Async pool finish on SIGTERM instead of
  # killing connections mid-flight. Pairs with AsyncConfig's awaitTermination for clean
  # zero-downtime rolling deploys (e.g. ECS).
  lifecycle:
    timeout-per-shutdown-phase: 30s

  servlet:
    multipart:
      # Match tubeshadow.recording.max-bytes so service-level validation kicks in
      # with a clean 413 response instead of Tomcat aborting at the default 1MB.
      max-file-size: 12MB
      max-request-size: 12MB

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  # Render/Fly/Heroku inject PORT; locally SERVER_PORT or 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful
  error:
    include-message: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Expose health + prometheus over the web (dev/test). Prod narrows/secures this in
# application-prod.yml. /actuator/prometheus carries the custom AI-path metrics.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

tubeshadow:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-change-in-prod-this-must-be-long-enough-for-hs256}
    access-token-ttl-seconds: ${JWT_TTL_SECONDS:86400}
  recording:
    storage-dir: ${RECORDING_STORAGE_DIR:./local-storage/recordings}
    max-bytes: 10485760  # 10MB
  # AI providers are tried in this order; each falls back to the next on quota/429/5xx/error.
  # Providers whose API key is unset are skipped. (AI_PROVIDER kept for back-compat; the ORDER
  # is what selects now — e.g. free-tier Gemini first, spill over to OpenAI, then Claude.)
  ai:
    order: ${AI_ORDER:gemini,openai,claude}
    provider: ${AI_PROVIDER:gemini}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    # gpt-4o-mini: cheap + JSON-mode capable. Override with OPENAI_MODEL.
    model: ${OPENAI_MODEL:gpt-4o-mini}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    # gemini-2.5-flash free tier: generous quota for personal study.
    # Stable alias: gemini-flash-latest. Override with GEMINI_MODEL env var.
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  transcription:
    # Speech-to-text — OpenAI gpt-4o-transcribe by default (low hallucination, dev-jargon accurate).
    # OpenAI-compatible, so pointing base-url/path/model at Groq whisper-large-v3 swaps providers.
    api-key: ${OPENAI_API_KEY:}
    base-url: ${TRANSCRIBE_BASE_URL:https://api.openai.com}
    path: ${TRANSCRIBE_PATH:/v1/audio/transcriptions}
    model: ${TRANSCRIBE_MODEL:gpt-4o-transcribe}
  youtube:
    oembed-url: https://www.youtube.com/oembed
    yt-dlp-binary: ${YT_DLP_BINARY:yt-dlp}
    yt-dlp-timeout-seconds: ${YT_DLP_TIMEOUT_SECONDS:30}
    yt-dlp-proxy: ${YT_DLP_PROXY:}
    pot-provider-base-url: ${YT_DLP_POT_PROVIDER_BASE_URL:http://localhost:4417}
    supadata:
      api-key: ${SUPADATA_API_KEY:}
      base-url: ${SUPADATA_BASE_URL:https://api.supadata.ai/v1}
      lang: ${SUPADATA_LANG:en}
      # native = existing captions only. Set SUPADATA_TRANSCRIPT_MODE=auto to allow paid AI fallback.
      mode: ${SUPADATA_TRANSCRIPT_MODE:native}
      poll-attempts: ${SUPADATA_POLL_ATTEMPTS:20}
      poll-interval-ms: ${SUPADATA_POLL_INTERVAL_MS:1000}
      timeout-seconds: ${SUPADATA_TIMEOUT_SECONDS:45}
    # Probe only supplies portrait/duration metadata. Keep it shorter than transcript fetch so a
    # stuck metadata probe cannot make the import feel frozen behind the load balancer.
    yt-dlp-probe-timeout-seconds: ${YT_DLP_PROBE_TIMEOUT_SECONDS:10}
  seed:
    curated:
      # Importing YouTube at startup makes prod deploy health depend on YouTube anti-bot state.
      enabled: ${CURATED_SEED_ENABLED:false}
  cors:
    # Comma-separated allowed origin patterns. Defaults are good for local dev + Vercel previews.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,https://*.vercel.app}
  rate-limit:
    # Simple per-IP+endpoint sliding-window limits on the auth endpoints.
    auth-attempts-per-minute: ${AUTH_RATE_LIMIT:20}
    # Per-USER limit for the AI composition check (each call costs a provider request).
    ai-per-minute: ${AI_RATE_LIMIT:15}
    # Comma-separated remote-addr prefixes from which X-Forwarded-For is trusted.
    # Empty (default) → always use Tomcat's remoteAddr, so X-F-F header spoofing
    # cannot bypass the limiter. Set this to your prod load-balancer CIDR(s).
    trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:}
  billing:
    # Shared secret the external billing platform sends as X-Billing-Secret on the entitlement
    # webhook. Empty (the default) => the webhook fails closed with 503. Set BILLING_WEBHOOK_SECRET
    # in any environment that should accept entitlement writes.
    webhook-secret: ${BILLING_WEBHOOK_SECRET:}
