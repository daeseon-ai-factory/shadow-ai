# Developer-focused YouTube videos seeded into the "Developer Picks" collection
# on first boot when the collection is empty.
#
# WHY a YAML file instead of a Flyway migration?
#   The set is curated by humans, evolves often, and reaching out to YouTube during
#   migration is fragile. A CommandLineRunner reads this file and uses the regular
#   import flow, so any URL/transcript failures degrade gracefully (logged + skipped)
#   instead of breaking startup.
#
# Each entry: { url, category }. The transcript is fetched at first import.
# Categories: tech_talk | interview | conference | code_review | demo
#
# !! Replace these with vetted picks before sharing with users. !!
# To verify a URL: open it, confirm it auto-plays English, and confirm CC is available.

collection:
  slug: developer-picks
  name: 개발자 추천 영상
  description: 개발자/엔지니어가 영어 쉐도잉용으로 보기 좋은 강연/인터뷰 모음. 자막 있는 영상만 포함.

videos:
  # NOTE: This file currently has a starter set. The first administrator should
  # extend it to ~30 videos before opening signups. Each URL must be verified
  # to (1) be valid, (2) have English captions.
  - { url: "https://www.youtube.com/watch?v=PUiPdMdlECg", category: "tech_talk" }    # Bret Victor — Inventing on Principle
  - { url: "https://www.youtube.com/watch?v=SxdOUGdseq4", category: "tech_talk" }    # Rich Hickey — Simple Made Easy
  - { url: "https://www.youtube.com/watch?v=o8NPllzkFhE", category: "interview" }    # Linus Torvalds — TED interview
  - { url: "https://www.youtube.com/watch?v=YQs6IC-vgmo", category: "tech_talk" }    # Joscha Bach — placeholder
  - { url: "https://www.youtube.com/watch?v=Bo0guUbL5uo", category: "tech_talk" }    # John Ousterhout — A Philosophy of Software Design
