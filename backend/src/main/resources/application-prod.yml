spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: false

server:
  error:
    # Don't leak internal exception messages to clients in prod
    include-message: never
    include-stacktrace: never

tubeshadow:
  recording:
    # Switch to S3 in prod. Bucket + region passed as env.
    storage: ${RECORDING_STORAGE:s3}
    s3:
      bucket: ${RECORDING_S3_BUCKET}
      region: ${AWS_REGION:ca-central-1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.tubeshadow: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

# Actuator — only health is exposed over the web in prod (for the load-balancer probe).
# metrics/info/env stay unexposed so nothing internal leaks publicly. When Micrometer
# lands (PROD-6), re-expose prometheus behind auth deliberately.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

# Disable the API explorer in prod — the OpenAPI schema and Swagger UI shouldn't be
# publicly reachable on a production deployment.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
