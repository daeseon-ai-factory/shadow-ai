spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: false

server:
  error:
    # Don't leak internal exception messages to clients in prod
    include-message: never
    include-stacktrace: never

tubeshadow:
  recording:
    # Switch to S3 in prod. Bucket + region passed as env.
    storage: ${RECORDING_STORAGE:s3}
    s3:
      bucket: ${RECORDING_S3_BUCKET}
      region: ${AWS_REGION:ca-central-1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.tubeshadow: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

# Actuator — health for ALB health checks; metrics endpoint stays private
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
