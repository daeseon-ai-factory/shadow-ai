spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: false

logging:
  level:
    com.tubeshadow: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
