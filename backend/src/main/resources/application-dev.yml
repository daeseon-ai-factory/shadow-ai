spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/tubeshadow
    username: ${POSTGRES_USER:tubeshadow}
    password: ${POSTGRES_PASSWORD:tubeshadow}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.tubeshadow: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
